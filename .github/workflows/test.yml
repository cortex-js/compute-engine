name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  corpus-pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Stage-1 box-check of the full Fungrim corpus. `--check` is a hard drift
      # gate: it re-runs Stage 1 and compares the fresh failure set against the
      # committed scripts/fungrim/validation-report.json (without rewriting it),
      # failing on ANY newly-failing entry (a regression) or newly-passing entry
      # (the committed report is stale — regenerate it). The prior soft >=99%
      # pass-rate gate silently absorbed a multi-entry drift; this does not.
      - name: Corpus box-check
        run: npx --yes tsx scripts/fungrim/validate.ts --corpus data/fungrim --check

      # Recompile a deterministic rule sample and assert the checked-in
      # artifact is still in sync with the engine (catches canonicalization
      # drift that silently stops compiled patterns from firing)
      - name: Artifact freshness
        run: npx --yes tsx scripts/fungrim/artifact-freshness.ts

      # Re-derive the curated solve templates (the `target:'solve'` overlay)
      # and assert they match the checked-in artifact, ids and fields (catches
      # drift between a seed's simplify rule and its derived root template)
      - name: Solve-template freshness
        run: npx --yes tsx scripts/fungrim/apply-solve-templates.ts --check

      # Full-recompile drift gate: assert no committed simplify rule would be
      # silently DROPPED (nor a new rule silently ADDED) by a fresh recompile.
      # The self-test validates rules in isolation and can false-no-fire a rule
      # that only fires within the full rule set; this gate makes any such
      # divergence a loud failure unless allowlisted (curation-overrides.json
      # `recompileDivergence`) with a justification.
      - name: Recompile drift
        run: npx --yes tsx scripts/fungrim/recompile-drift.ts

      # Re-derive the bundled analytic-property store (poles/zeros/branch
      # cuts/... that back `ce.functionProperties` and pole-aware `N()`) from
      # data/fungrim/properties.json and assert it matches the checked-in
      # artifact (catches corpus or grouping drift).
      - name: Analytic-property store freshness
        run: npx --yes tsx scripts/fungrim/compile-properties.ts --check

      # Regenerate the bundled Rubi integration corpus and assert the
      # checked-in artifact is still in sync with data/rubi (catches corpus or
      # bundler drift that would ship stale/mis-prioritized integration rules).
      # The functional gate (loadIntegrationRules compiles the bundle and
      # integrates a verified set of integrands) runs in the `test` job.
      - name: Integration-rules bundle freshness
        run: |
          npx --yes tsx scripts/rubi/bundle-corpus.ts
          git diff --exit-code -- src/compute-engine/rubi/rubi-rules-data.json

      # MathNet parser-regression gate: every corpus case whose recorded
      # `observed` outcome is "clean" must still parse clean, and nothing may
      # throw (docs/mathnet/parser-test-cases.json is the recorded contract;
      # refresh it with check-corpus.ts --update after reviewing changes).
      - name: MathNet parser corpus regression gate
        run: npx --yes tsx docs/mathnet/scripts/check-corpus.ts

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src --ext .ts

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck
